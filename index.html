<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技感全台階排行榜組件 - 數值可修改完全透明版</title>
    <style>
        /* ==========================================
           1. 環境重置與基本樣式
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: transparent; /* 僅作測試背景用，組件本體是完全透明的 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ==========================================
           2. 自由縮放外殼（保持完全透明）
           ========================================== */
        .leaderboard-card {
            position: relative;
            width: 840px;   
            height: 580px;  
            min-width: 620px;
            min-height: 480px;
            max-width: 1600px;
            max-height: 1200px;
            
            resize: both;
            overflow: hidden;
            
            background: transparent;
            backdrop-filter: none;
            border: none;
            
            padding: 10px;
            display: flex;
            flex-direction: column;
            container-type: size;
        }

        /* 美化縮放手柄 */
        .leaderboard-card::-webkit-resizer {
            display: block !important;
            background: linear-gradient(135deg, transparent 40%, rgba(0, 229, 255, 0.4) 50%, #00e5ff 100%);
            width: 14px;
            height: 14px;
        }

        .board-header {
            font-size: clamp(14px, 3.2cqw, 20px);
            color: #ffffff;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2.5cqh;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #00e5ff, #3370ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
            flex-shrink: 0;
        }

        /* ==========================================
           3. 全名次 3D 階梯排版
           ========================================== */
        .podium-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            flex: 1;
            padding: 0 2px;
            gap: 8px;
        }

        .podium-slot {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-width: 0; 
        }

        /* 頭像外圈流光與動態跳動 */
        .avatar-wrapper {
            position: relative;
            width: 8.5cqw;
            height: 8.5cqw;
            max-width: 55px;
            max-height: 55px;
            min-width: 32px;
            min-height: 32px;
            border-radius: 50%;
            margin-bottom: 8px;
            animation: floatAvatar 3s ease-in-out infinite;
            flex-shrink: 0;
        }

        /* 第一名頭像點擊控制中心 */
        .rank-1 .avatar-wrapper {
            cursor: pointer;
            width: 10.5cqw; 
            height: 10.5cqw;
            max-width: 65px;
            max-height: 65px;
        }
        .rank-1 .avatar-wrapper:hover {
            transform: scale(1.08);
            animation: floatAvatar 1.2s ease-in-out infinite;
        }

        /* 皇冠裝飾 */
        .crown {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%) rotate(-5deg);
            font-size: clamp(12px, 3cqw, 18px);
            z-index: 6; /* 確保在數字層上方 */
            display: none;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .rank-1 .crown { display: block; }

        .avatar-glow {
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #3370ff, #00e5ff, transparent 70%, #3370ff);
            animation: rotateRing 2.5s linear infinite;
        }

        .rank-1 .avatar-glow {
            background: conic-gradient(from 0deg, #ffcc00, #ff6600, transparent 60%, #ffcc00);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }

        .avatar-img {
            position: absolute;
            inset: 2px;
            border-radius: 50%;
            background: #1f2937;
            background-size: cover;
            background-position: center;
            border: 1.5px solid #0b0f19;
            z-index: 2; /* 背景圖層 */
        }

        /* ✨ 核心修正：圆圈中心数字绝对顶层显化样式 ✨ */
        .avatar-number {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 4; /* 绝对凌驾于 avatar-img 背景图之上 */
            font-size: clamp(14px, 3.5cqw, 24px); /* 随容器智能缩放 */
            font-weight: 900; /* 超粗体，确保极佳清晰度 */
            color: #ffffff;
            font-family: "Impact", "Arial Black", sans-serif;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8), 0 0 4px rgba(0, 0, 0, 0.5);
            pointer-events: none; /* 不干扰点击事件 */
        }
        
        /* 针对第一名的数字进行特殊发光高亮强化 */
        .rank-1 .avatar-number {
            color: #ffffff;
            text-shadow: 0 0 8px #ffcc00, 0 2px 5px rgba(0,0,0,0.9);
        }

        /* ==========================================
           4. 高台階本體與文字完整顯示設定
           ========================================== */
        .step {
            width: 100%;
            background: linear-gradient(180deg, rgba(31, 41, 55, 0.88), rgba(17, 24, 39, 0.98));
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 10px 4px 6px 4px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        /* 各名次的台階邊框頂線顏色 */
        .rank-1 .step { border-top: 2px solid #ffcc00; }
        .rank-2 .step { border-top: 2px solid #00e5ff; }
        .rank-3 .step { border-top: 2px solid #ff7849; }
        .rank-4 .step { border-top: 2px solid #3b82f6; }
        .rank-5 .step { border-top: 2px solid #10b981; }
        .rank-6 .step { border-top: 2px solid #8b5cf6; }
        .rank-7 .step { border-top: 2px solid #6b7280; }
        .rank-8 .step { border-top: 2px solid #4b5563; }
        .podium-slot .step { border-top: 2px solid #4b5563; } 

        /* 排名名稱 */
        .player-name {
            font-size: clamp(9px, 1.5cqw, 12px);
            color: #e5e7eb;
            font-weight: 500;
            margin-top: 2px;
            width: 100%;
            
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
            word-break: break-all;
            overflow-wrap: anywhere;
            line-height: 1.25;
            
            display: -webkit-box;
            -webkit-box-orient: vertical;
        }
        .rank-1 .player-name { font-weight: 700; color: #ffffff; }

        /* 數據與指標 */
        .player-score {
            font-size: clamp(8px, 1.3cqw, 11px);
            color: #9ca3af;
            margin-top: 4px;
            font-family: monospace;
            width: 100%;
            white-space: normal;
            word-break: break-all;
            line-height: 1.1;
        }
        .rank-1 .player-score { color: #ffcc00; }

        /* 底部中文名次文字 */
        .step-number {
            font-size: clamp(11px, 2cqw, 15px);
            font-weight: 800;
            margin-top: auto; 
            line-height: 1.2;
            padding-top: 6px;
            width: 100%;
            text-align: center;
            display: block;
        }
        .rank-1 .step-number { color: #ffcc00; }
        .rank-2 .step-number { color: #00e5ff; }
        .rank-3 .step-number { color: #ff7849; }
        .rank-4 .step-number { color: #3b82f6; }
        .rank-5 .step-number { color: #10b981; }
        .rank-6 .step-number { color: #8b5cf6; }
        .rank-7 .step-number { color: #6b7280; }
        .rank-8 .step-number { color: #4b5563; }
        .podium-slot .step-number { color: #9ca3af; }

        /* ==========================================
           5. 修改控制選單面板
           ========================================== */
        .edit-panel {
            position: absolute;
            inset: 0;
            background: rgba(11, 15, 25, 0.98);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        .edit-panel.active {
            opacity: 1;
            pointer-events: auto;
        }

        .edit-panel-header {
            text-align: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .edit-panel-title {
            font-size: 14px;
            color: #ffcc00;
            font-weight: 600;
        }
        
        .edit-panel-subtitle {
            font-size: 11px;
            color: #6b7280;
            margin-top: 2px;
        }

        .form-scroll-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
            margin-bottom: 10px;
        }
        
        .form-scroll-area::-webkit-scrollbar { width: 4px; }
        .form-scroll-area::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }

        .form-group-row {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            gap: 10px;
        }

        .form-group-row label {
            font-size: 12px;
            color: #9ca3af;
            width: 55px;
            flex-shrink: 0;
            font-weight: 600;
        }
        
        .form-group-row label.label-highlight { color: #ffcc00; }

        .input-cols {
            display: flex;
            flex: 1;
            gap: 8px;
        }

        .form-group-row input {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 4px;
            color: #fff;
            padding: 5px 8px;
            font-size: 12px;
            outline: none;
        }

        .input-name { flex: 2; }  
        .input-score { flex: 1; } 

        .form-group-row input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 5px rgba(0, 229, 255, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 10px;
        }

        .rank-modifier-controls {
            display: flex;
            gap: 6px;
            margin-right: auto; 
        }

        .btn {
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            font-weight: 500;
            transition: background 0.2s, opacity 0.2s;
        }

        .btn-submit { background: #ffcc00; color: #111827; font-weight: 600; }
        .btn-submit:hover { background: #e6b800; }
        .btn-cancel { background: #374151; color: #9ca3af; }
        .btn-cancel:hover { background: #4b5563; }
        
        .btn-add { background: #10b981; color: #fff; font-weight: 600; }
        .btn-add:hover { background: #059669; }
        .btn-remove { background: #ef4444; color: #fff; font-weight: 600; }
        .btn-remove:hover { background: #dc2626; }

        /* ==========================================
           6. 動態特效 Animation
           ========================================== */
        @keyframes rotateRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes floatAvatar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="leaderboard-card">
        <div class="board-header">产线产效实时綜合排行</div>
        
        <div class="podium-container" id="podiumContainer">
            </div>

        <div class="edit-panel" id="editPanel">
            <div class="edit-panel-header">
                <div class="edit-panel-title">排行榜數據設定中心</div>
                <div class="edit-panel-subtitle">點擊第一名頭像觸發，可自訂名次數量、各線名稱與數值指標（含單位）</div>
            </div>
            
            <div class="form-scroll-area" id="formScrollArea">
                </div>

            <div class="btn-group">
                <div class="rank-modifier-controls">
                    <button class="btn btn-add" id="btnAddRank" title="增加一個排名欄位">添加名次 (+)</button>
                    <button class="btn btn-remove" id="btnRemoveRank" title="刪除最後一個名次">刪除名次 (-)</button>
                </div>
                <button class="btn btn-cancel" id="btnCancel">取消</button>
                <button class="btn btn-submit" id="btnSubmit">確認儲存</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 固定指標預設初始化數據
            const defaultData = {
                1: { label: "第一名", name: "无菌1线", score: "95.8 %", fill: "%23ffcc00" },
                2: { label: "第二名", name: "矿水2线", score: "92.4 %", fill: "%2300e5ff" },
                3: { label: "第三名", name: "CAN线", score: "89.1 %", fill: "%23ff7849" },
                4: { label: "第四名", name: "热充2线", score: "85.5 %", fill: "%233b82f6" },
                5: { label: "第五名", name: "无菌3线", score: "82.0 %", fill: "%2310b981" },
                6: { label: "第六名", name: "无菌5线", score: "79.3 %", fill: "%238b5cf6" },
                7: { label: "第七名", name: "TP1线", score: "75.0 件", fill: "%236b7280" },
                8: { label: "第八名", name: "矿水2线", score: "71.2 %", fill: "%234b5563" }
            };

            const podiumContainer = document.getElementById('podiumContainer');
            const editPanel = document.getElementById('editPanel');
            const formScrollArea = document.getElementById('formScrollArea');
            const btnCancel = document.getElementById('btnCancel');
            const btnSubmit = document.getElementById('btnSubmit');
            const btnAddRank = document.getElementById('btnAddRank');
            const btnRemoveRank = document.getElementById('btnRemoveRank');

            let currentTotalRanks = parseInt(localStorage.getItem('flex_leaderboard_total_count')) || 8;
            let editingTotalRanks = currentTotalRanks; 

            // 生成數字對應的中文標籤文字
            function getRankChineseLabel(rank) {
                if (defaultData[rank]) return defaultData[rank].label;
                const chineseNums = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十", 
                                     "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九", "二十"];
                return rank <= 20 ? `第${chineseNums[rank]}名` : `第 ${rank} 名`;
            }

            // 獲取名次對應的圓圈背景色 SVG
            function getAvatarUrl(rank) {
                const colorFill = defaultData[rank] ? defaultData[rank].fill : "%234b5563";
                return `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='50' height='50' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='${colorFill}'/></svg>`;
            }

            // 讀取快取名稱
            function getRankName(rank) {
                const savedName = localStorage.getItem(`flex_leaderboard_name_rank_${rank}`);
                if(savedName !== null) return savedName;
                return defaultData[rank] ? defaultData[rank].name : `待定产线 ${rank}`;
            }

            // 讀取快取數值數字
            function getRankScore(rank) {
                const savedScore = localStorage.getItem(`flex_leaderboard_score_rank_${rank}`);
                if(savedScore !== null) return savedScore;
                return defaultData[rank] ? defaultData[rank].score : `0.0 %`;
            }

            // 軸心波浪型排版順序生成函數
            function getCenterSymmetricOrder(total) {
                let left = [];
                let right = [];
                for (let i = 1; i <= total; i++) {
                    if (i === 1) {
                        right.push(1);
                    } else if (i % 2 === 0) {
                        left.unshift(i);
                    } else {
                        right.push(i);
                    }
                }
                return left.concat(right);
            }

            // 計算台階百分比高度
            function getStepHeightPercentage(rank, total) {
                const maxHeight = 62; 
                const minHeight = 12; 
                if (total <= 1) return maxHeight;
                return maxHeight - ((rank - 1) * (maxHeight - minHeight) / (total - 1));
            }

            // 渲染前端台階看板
            function renderLeaderboard() {
                podiumContainer.innerHTML = '';
                const orderArray = getCenterSymmetricOrder(currentTotalRanks);
                
                let htmlBuffer = '';
                orderArray.forEach((r, idx) => {
                    const isRank1 = (r === 1);
                    const calcHeight = getStepHeightPercentage(r, currentTotalRanks);
                    const delayTime = (idx * 0.15).toFixed(1);

                    htmlBuffer += `
                        <div class="podium-slot rank-${r}" style="order: ${idx + 1};">
                            <div class="avatar-wrapper" ${isRank1 ? 'id="avatarTrigger1" title="點擊第一名頭像修改數據或調整名次數量"' : ''} style="animation-delay: ${delayTime}s;">
                                ${isRank1 ? '<span class="crown">👑</span>' : ''}
                                <div class="avatar-glow"></div>
                                <div class="avatar-img" style="background-image: url('${getAvatarUrl(r)}');"></div>
                                <div class="avatar-number">${r}</div>
                            </div>
                            <div class="step" style="height: ${calcHeight}cqh;">
                                <span class="player-name">${getRankName(r)}</span>
                                <span class="player-score">${getRankScore(r)}</span>
                                <span class="step-number">${getRankChineseLabel(r)}</span>
                            </div>
                        </div>
                    `;
                });
                podiumContainer.innerHTML = htmlBuffer;

                // 重新綁定第一名頭像的點擊事件
                const trigger = document.getElementById('avatarTrigger1');
                if (trigger) {
                    trigger.addEventListener('click', (e) => {
                        e.stopPropagation();
                        editingTotalRanks = currentTotalRanks; 
                        buildEditForm();
                        editPanel.classList.add('active');
                        
                        setTimeout(() => {
                            const firstInput = document.getElementById('input-name-1');
                            if (firstInput) {
                                firstInput.focus();
                                firstInput.select();
                            }
                        }, 50);
                    });
                }
            }

            // 動態構建表單
            function buildEditForm() {
                formScrollArea.innerHTML = '';
                for (let r = 1; r <= editingTotalRanks; r++) {
                    const row = document.createElement('div');
                    row.className = 'form-group-row';
                    const isRank1 = (r === 1);
                    row.innerHTML = `
                        <label class="${isRank1 ? 'label-highlight' : ''}">${getRankChineseLabel(r)} ${isRank1 ? '👑' : ''}</label>
                        <div class="input-cols">
                            <input type="text" class="input-name" id="input-name-${r}" placeholder="請輸入名稱" value="${getRankName(r)}">
                            <input type="text" class="input-score" id="input-score-${r}" placeholder="數值/單位" value="${getRankScore(r)}">
                        </div>
                    `;
                    formScrollArea.appendChild(row);
                }
                formScrollArea.scrollTop = formScrollArea.scrollHeight;
            }

            // 增加名次栏位 (+)
            btnAddRank.addEventListener('click', (e) => {
                e.stopPropagation();
                if (editingTotalRanks >= 20) {
                    alert("名次上限最多支持 20 個線位排版！");
                    return;
                }
                editingTotalRanks++;
                buildEditForm();
            });

            // 減少最後一名欄位 (-)
            btnRemoveRank.addEventListener('click', (e) => {
                e.stopPropagation();
                if (editingTotalRanks <= 1) {
                    alert("排行榜最少需要保留 1 個名次台階！");
                    return;
                }
                editingTotalRanks--;
                buildEditForm();
            });

            // 取消按鈕
            btnCancel.addEventListener('click', (e) => {
                e.stopPropagation();
                editPanel.classList.remove('active');
            });

            // 儲存所有更動
            btnSubmit.addEventListener('click', (e) => {
                e.stopPropagation();
                
                for (let r = 1; r <= editingTotalRanks; r++) {
                    const nameInput = document.getElementById(`input-name-${r}`);
                    const scoreInput = document.getElementById(`input-score-${r}`);
                    
                    if (nameInput && scoreInput) {
                        const newName = nameInput.value.trim() || `${getRankChineseLabel(r)}`;
                        const newScore = scoreInput.value.trim() || `--`;
                        
                        localStorage.setItem(`flex_leaderboard_name_rank_${r}`, newName);
                        localStorage.setItem(`flex_leaderboard_score_rank_${r}`, newScore);
                    }
                }
                
                currentTotalRanks = editingTotalRanks;
                localStorage.setItem('flex_leaderboard_total_count', currentTotalRanks);
                
                editPanel.classList.remove('active');
                renderLeaderboard();
            });

            // 首次加載初始化
            renderLeaderboard();
        });
    </script>
</body>
</html>
