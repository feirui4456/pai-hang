<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技感全台階排行榜組件 - 數值可修改完全透明版</title>
    <style>
        /* ==========================================
           1. 環境重置與基本樣式
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0b0f19; /* 僅作測試背景用，組件本體是完全透明的 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ==========================================
           2. 自由縮放外殼（保持完全透明）
           ========================================== */
        .leaderboard-card {
            position: relative;
            width: 840px;   
            height: 580px;  
            min-width: 620px;
            min-height: 480px;
            max-width: 1600px;
            max-height: 1200px;
            
            resize: both;
            overflow: hidden;
            
            background: transparent;
            backdrop-filter: none;
            border: none;
            
            padding: 10px;
            display: flex;
            flex-direction: column;
            container-type: size;
        }

        /* 美化縮放手柄 */
        .leaderboard-card::-webkit-resizer {
            display: block !important;
            background: linear-gradient(135deg, transparent 40%, rgba(0, 229, 255, 0.4) 50%, #00e5ff 100%);
            width: 14px;
            height: 14px;
        }

        .board-header {
            font-size: clamp(14px, 3.2cqw, 20px);
            color: #ffffff;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2.5cqh;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #00e5ff, #3370ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
            flex-shrink: 0;
        }

        /* ==========================================
           3. 全名次 3D 階梯排版
           ========================================== */
        .podium-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            flex: 1;
            padding: 0 2px;
            gap: 8px;
        }

        .podium-slot {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-width: 0; 
        }

        /* 軸心對稱排版順序控制：6, 4, 2, 1, 3, 5, 7, 8 */
        .rank-1 { order: 4; }
        .rank-2 { order: 3; }
        .rank-3 { order: 5; }
        .rank-4 { order: 2; }
        .rank-5 { order: 6; }
        .rank-6 { order: 1; }
        .rank-7 { order: 7; }
        .rank-8 { order: 8; }

        /* 頭像外圈流光與動態跳動 */
        .avatar-wrapper {
            position: relative;
            width: 8.5cqw;
            height: 8.5cqw;
            max-width: 55px;
            max-height: 55px;
            min-width: 32px;
            min-height: 32px;
            border-radius: 50%;
            margin-bottom: 8px;
            animation: floatAvatar 3s ease-in-out infinite;
            flex-shrink: 0;
        }

        /* 錯開跳動波形 */
        .podium-slot:nth-child(1) .avatar-wrapper { animation-delay: 0.2s; }
        .podium-slot:nth-child(2) .avatar-wrapper { animation-delay: 0.0s; }
        .podium-slot:nth-child(3) .avatar-wrapper { animation-delay: 0.4s; }
        .podium-slot:nth-child(4) .avatar-wrapper { animation-delay: 0.6s; }
        .podium-slot:nth-child(5) .avatar-wrapper { animation-delay: 0.8s; }
        .podium-slot:nth-child(6) .avatar-wrapper { animation-delay: 1.0s; }
        .podium-slot:nth-child(7) .avatar-wrapper { animation-delay: 1.2s; }
        .podium-slot:nth-child(8) .avatar-wrapper { animation-delay: 1.4s; }

        /* 第一名頭像點擊控制中心 */
        .rank-1 .avatar-wrapper {
            cursor: pointer;
            width: 10.5cqw; 
            height: 10.5cqw;
            max-width: 65px;
            max-height: 65px;
        }
        .rank-1 .avatar-wrapper:hover {
            transform: scale(1.08);
            animation: floatAvatar 1.2s ease-in-out infinite;
        }

        /* 皇冠裝飾：置於第一名頭像正中央上方 */
        .crown {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%) rotate(-5deg);
            font-size: clamp(12px, 3cqw, 18px);
            z-index: 5;
            display: none;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .rank-1 .crown { display: block; }

        .avatar-glow {
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #3370ff, #00e5ff, transparent 70%, #3370ff);
            animation: rotateRing 2.5s linear infinite;
        }

        .rank-1 .avatar-glow {
            background: conic-gradient(from 0deg, #ffcc00, #ff6600, transparent 60%, #ffcc00);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }

        .avatar-img {
            position: absolute;
            inset: 2px;
            border-radius: 50%;
            background: #1f2937;
            background-size: cover;
            background-position: center;
            border: 1.5px solid #0b0f19;
            z-index: 2;
        }

        /* ==========================================
           4. 高台階本體與文字完整顯示設定
           ========================================== */
        .step {
            width: 100%;
            background: linear-gradient(180deg, rgba(31, 41, 55, 0.88), rgba(17, 24, 39, 0.98));
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 10px 4px 6px 4px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        /* 拔高所有名次的台階佔比 */
        .rank-1 .step { height: 62cqh; border-top: 3px solid #ffcc00; background: linear-gradient(180deg, rgba(255, 204, 0, 0.12), rgba(17, 24, 39, 0.98)); }
        .rank-2 .step { height: 53cqh; border-top: 2px solid #00e5ff; }
        .rank-3 .step { height: 45cqh; border-top: 2px solid #ff7849; }
        .rank-4 .step { height: 38cqh; border-top: 2px solid #3b82f6; }
        .rank-5 .step { height: 32cqh; border-top: 2px solid #10b981; }
        .rank-6 .step { height: 26cqh; border-top: 2px solid #8b5cf6; }
        .rank-7 .step { height: 21cqh; border-top: 2px solid #6b7280; }
        .rank-8 .step { height: 16cqh; border-top: 2px solid #4b5563; }

        /* 排名名稱：完全自動換行，文字不裁切不隱藏 */
        .player-name {
            font-size: clamp(9px, 1.5cqw, 12px);
            color: #e5e7eb;
            font-weight: 500;
            margin-top: 2px;
            width: 100%;
            
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
            word-break: break-all;
            overflow-wrap: anywhere;
            line-height: 1.25;
            
            display: -webkit-box;
            -webkit-box-orient: vertical;
        }
        .rank-1 .player-name { font-weight: 700; color: #ffffff; }

        /* 數據與指標：完全自動換行 */
        .player-score {
            font-size: clamp(8px, 1.3cqw, 11px);
            color: #9ca3af;
            margin-top: 4px;
            font-family: monospace;
            width: 100%;
            white-space: normal;
            word-break: break-all;
            line-height: 1.1;
        }
        .rank-1 .player-score { color: #ffcc00; }

        /* 序號數字：固定釘在各台階最底部 */
        .step-number {
            font-size: clamp(12px, 2.5cqw, 18px);
            font-weight: 800;
            margin-top: auto; 
            line-height: 1;
            padding-top: 6px;
        }
        .rank-1 .step-number { color: #ffcc00; }
        .rank-2 .step-number { color: #00e5ff; }
        .rank-3 .step-number { color: #ff7849; }
        .rank-4 .step-number { color: #3b82f6; }
        .rank-5 .step-number { color: #10b981; }
        .rank-6 .step-number { color: #8b5cf6; }
        .rank-7 .step-number { color: #6b7280; }
        .rank-8 .step-number { color: #4b5563; }

        /* ==========================================
           5. 升級版：雙項目修改控制選單面板
           ========================================== */
        .edit-panel {
            position: absolute;
            inset: 0;
            background: rgba(11, 15, 25, 0.98);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        .edit-panel.active {
            opacity: 1;
            pointer-events: auto;
        }

        .edit-panel-header {
            text-align: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .edit-panel-title {
            font-size: 14px;
            color: #ffcc00;
            font-weight: 600;
        }
        
        .edit-panel-subtitle {
            font-size: 11px;
            color: #6b7280;
            margin-top: 2px;
        }

        .form-scroll-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
            margin-bottom: 10px;
        }
        
        .form-scroll-area::-webkit-scrollbar { width: 4px; }
        .form-scroll-area::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }

        .form-group-row {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            gap: 10px;
        }

        .form-group-row label {
            font-size: 12px;
            color: #9ca3af;
            width: 55px;
            flex-shrink: 0;
            font-weight: 600;
        }
        
        .form-group-row label.label-highlight { color: #ffcc00; }

        /* 雙欄位佈局控制 */
        .input-cols {
            display: flex;
            flex: 1;
            gap: 8px;
        }

        .form-group-row input {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 4px;
            color: #fff;
            padding: 5px 8px;
            font-size: 12px;
            outline: none;
        }

        .input-name { flex: 2; }  /* 名稱輸入框較寬 */
        .input-score { flex: 1; } /* 數值輸入框較窄 */

        .form-group-row input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 5px rgba(0, 229, 255, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            flex-shrink: 0;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 10px;
        }

        .btn {
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-submit { background: #ffcc00; color: #111827; font-weight: 600; }
        .btn-submit:hover { background: #e6b800; }
        .btn-cancel { background: #374151; color: #9ca3af; }
        .btn-cancel:hover { background: #4b5563; }

        /* ==========================================
           6. 動態特效 Animation
           ========================================== */
        @keyframes rotateRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes floatAvatar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="leaderboard-card">
        <div class="board-header">产线产效实时綜合排行</div>
        
        <!-- 全名次階梯容器 -->
        <div class="podium-container" id="podiumContainer">
            
            <script>
                const ranks = [1, 2, 3, 4, 5, 6, 7, 8];
                let htmlBuffer = '';
                ranks.forEach(r => {
                    const isRank1 = (r === 1);
                    htmlBuffer += `
                        <div class="podium-slot rank-${r}">
                            <div class="avatar-wrapper" ${isRank1 ? 'id="avatarTrigger1" title="點擊第一名頭像修改所有排行數據"' : ''}>
                                ${isRank1 ? '<span class="crown">👑</span>' : ''}
                                <div class="avatar-glow"></div>
                                <div class="avatar-img" id="img-${r}"></div>
                            </div>
                            <div class="step">
                                <span class="player-name" id="name-${r}">加載中..</span>
                                <span class="player-score" id="score-${r}">--</span>
                                <span class="step-number">${r}</span>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('podiumContainer').innerHTML = htmlBuffer;
            </script>

        </div>

        <!-- 彈出式全域修改控制選單（支援名稱與數字同時調整） -->
        <div class="edit-panel" id="editPanel">
            <div class="edit-panel-header">
                <div class="edit-panel-title">排行榜數據設定中心</div>
                <div class="edit-panel-subtitle">點擊第一名頭像觸發，可自訂各名次的名稱與數值指標（含單位）</div>
            </div>
            
            <div class="form-scroll-area" id="formScrollArea">
                <!-- 由 JavaScript 動態生成雙欄位輸入框 -->
            </div>

            <div class="btn-group">
                <button class="btn btn-cancel" id="btnCancel">取消</button>
                <button class="btn btn-submit" id="btnSubmit">確認儲存</button>
            </div>
        </div>
    </div>

    <!-- ==========================================
       7. 核心交互與雙重數據本地保存腳本
       ========================================== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 固定指標預設初始化數據
            const defaultData = {
                1: { name: "无菌1线", score: "95.8 %", avatar: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='50' height='50' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23ffcc00'/><text x='50' y='60' font-size='20' text-anchor='middle' fill='white'>第一名</text></svg>" },
                2: { name: "矿水2线", score: "92.4 %", avatar: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='50' height='50' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%2300e5ff'/><text x='50' y='60' font-size='20' text-anchor='middle' fill='white'>第二名</text></svg>" },
                3: { name: "CAN线", score: "89.1 %", avatar: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='50' height='50' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23ff7849'/><text x='50' y='60' font-size='20' text-anchor='middle' fill='white'>第三名</text></svg>" },
                4: { name: "热充2线", score: "85.5 %", avatar: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='50' height='50' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%233b82f6'/><text x='50' y='60' font-size='20' text-anchor='middle' fill='white'>第四名</text></svg>" },
                5: { name: "无菌3线", score: "82.0 %", avatar: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='50' height='50' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%2310b981'/><text x='50' y='60' font-size='20' text-anchor='middle' fill='white'>第五名</text></svg>" },
                6: { name: "无菌5线", score: "79.3 %", avatar: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='50' height='50' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%238b5cf6'/><text x='50' y='60' font-size='20' text-anchor='middle' fill='white'>第六名</text></svg>" },
                7: { name: "TP1线", score: "75.0 件", avatar: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='50' height='50' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%236b7280'/><text x='50' y='60' font-size='20' text-anchor='middle' fill='white'>第七名</text></svg>" },
                8: { name: "矿水2线", score: "71.2 %", avatar: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='50' height='50' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%234b5563'/><text x='50' y='60' font-size='20' text-anchor='middle' fill='white'>第八名</text></svg>" }
            };

            const avatarTrigger1 = document.getElementById('avatarTrigger1');
            const editPanel = document.getElementById('editPanel');
            const formScrollArea = document.getElementById('formScrollArea');
            const btnCancel = document.getElementById('btnCancel');
            const btnSubmit = document.getElementById('btnSubmit');

            // 讀取快取名稱
            function getRankName(rank) {
                const savedName = localStorage.getItem(`flex_leaderboard_name_rank_${rank}`);
                return savedName !== null ? savedName : defaultData[rank].name;
            }

            // 讀取快取數值數字
            function getRankScore(rank) {
                const savedScore = localStorage.getItem(`flex_leaderboard_score_rank_${rank}`);
                return savedScore !== null ? savedScore : defaultData[rank].score;
            }

            // 渲染看板
            function renderLeaderboard() {
                for (let r = 1; r <= 8; r++) {
                    document.getElementById(`name-${r}`).textContent = getRankName(r);
                    document.getElementById(`score-${r}`).textContent = getRankScore(r);
                    document.getElementById(`img-${r}`).style.backgroundImage = `url("${defaultData[r].avatar}")`;
                }
            }

            // 動態構建表單（包含名稱與數字雙輸入框）
            function buildEditForm() {
                formScrollArea.innerHTML = '';
                for (let r = 1; r <= 8; r++) {
                    const row = document.createElement('div');
                    row.className = 'form-group-row';
                    const isRank1 = (r === 1);
                    row.innerHTML = `
                        <label class="${isRank1 ? 'label-highlight' : ''}">${isRank1 ? '第 1 名 👑' : `第 ${r} 名`}</label>
                        <div class="input-cols">
                            <input type="text" class="input-name" id="input-name-${r}" placeholder="請輸入名稱" value="${getRankName(r)}">
                            <input type="text" class="input-score" id="input-score-${r}" placeholder="數值/單位" value="${getRankScore(r)}">
                        </div>
                    `;
                    formScrollArea.appendChild(row);
                }
            }

            // 點擊第一名頭像開啟設定中心
            avatarTrigger1.addEventListener('click', (e) => {
                e.stopPropagation();
                buildEditForm();
                editPanel.classList.add('active');
                
                setTimeout(() => {
                    const firstInput = document.getElementById('input-name-1');
                    if (firstInput) {
                        firstInput.focus();
                        firstInput.select();
                    }
                }, 50);
            });

            btnCancel.addEventListener('click', (e) => {
                e.stopPropagation();
                editPanel.classList.remove('active');
            });

            // 儲存所有更動
            btnSubmit.addEventListener('click', (e) => {
                e.stopPropagation();
                for (let r = 1; r <= 8; r++) {
                    const nameInput = document.getElementById(`input-name-${r}`);
                    const scoreInput = document.getElementById(`input-score-${r}`);
                    
                    if (nameInput && scoreInput) {
                        const newName = nameInput.value.trim() || `第 ${r} 名`;
                        const newScore = scoreInput.value.trim() || `--`;
                        
                        localStorage.setItem(`flex_leaderboard_name_rank_${r}`, newName);
                        localStorage.setItem(`flex_leaderboard_score_rank_${r}`, newScore);
                    }
                }
                editPanel.classList.remove('active');
                renderLeaderboard();
            });

            renderLeaderboard();
        });
    </script>
</body>
</html>
